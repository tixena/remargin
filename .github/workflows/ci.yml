name: CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always
  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        components: clippy, rustfmt

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9
        run_install: false

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: pnpm
        cache-dependency-path: packages/pnpm-lock.yaml

    - name: Install just
      uses: taiki-e/install-action@v2
      with:
        tool: just

    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install pnpm dependencies
      working-directory: packages
      run: pnpm install --frozen-lockfile

    # The steps below run the equivalent of `just all`
    # (generate-types -> lint -> build -> test), split into separate steps so
    # the Discord notification can report which stage failed.

    - name: Generate types
      id: generate
      run: |
        echo "🧬 Generating TypeScript types + Zod schemas..."
        just generate-types

    - name: Lint (Rust + TypeScript)
      id: check
      run: |
        echo "🔍 Linting (clippy + fmt + biome + tsc)..."
        just lint

    - name: Build (Rust + TypeScript)
      id: build
      run: |
        echo "🏗️ Building..."
        just build

    - name: Run tests
      id: test
      run: |
        echo "🧪 Running tests..."
        just test

    - name: Install cargo-audit
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-audit

    - name: Audit dependencies
      id: audit
      run: |
        echo "🔒 Auditing dependencies (cargo audit)..."
        just audit

    - name: Send Discord notification
      if: always()
      # All GitHub context is passed via env (NOT interpolated into the script
      # body) so attacker-controllable strings like commit messages cannot break
      # the JSON or inject shell. The payload is assembled with jq, which escapes
      # everything safely.
      env:
        EVENT_NAME: ${{ github.event_name }}
        REPO: ${{ github.repository }}
        BRANCH: ${{ github.head_ref || github.ref_name }}
        COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        PUSH_MSG: ${{ github.event.head_commit.message }}
        PUSH_AUTHOR: ${{ github.event.head_commit.author.name }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_URL: ${{ github.event.pull_request.html_url }}
        PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        ACTOR: ${{ github.actor }}
        SERVER_URL: ${{ github.server_url }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        TIMESTAMP: ${{ github.event.head_commit.timestamp }}
        GEN: ${{ steps.generate.outcome }}
        CHK: ${{ steps.check.outcome }}
        BLD: ${{ steps.build.outcome }}
        TST: ${{ steps.test.outcome }}
        AUD: ${{ steps.audit.outcome }}
      run: |
        # Validate repository to prevent forks from sending notifications
        if [[ "$REPO" != "tixena/remargin" ]]; then
          echo "⏭️ Skipping Discord notification (repository is $REPO, not tixena/remargin)"
          exit 0
        fi

        # Overall status + which step failed
        JOB_STATUS="success"
        FAILED_STEP="None"
        if [[ "$GEN" == "failure" ]]; then JOB_STATUS="failure"; FAILED_STEP="Generate types (just generate-types)";
        elif [[ "$CHK" == "failure" ]]; then JOB_STATUS="failure"; FAILED_STEP="Lint (just lint)";
        elif [[ "$BLD" == "failure" ]]; then JOB_STATUS="failure"; FAILED_STEP="Build (just build)";
        elif [[ "$TST" == "failure" ]]; then JOB_STATUS="failure"; FAILED_STEP="Tests (just test)";
        elif [[ "$AUD" == "failure" ]]; then JOB_STATUS="failure"; FAILED_STEP="Audit (just audit)";
        fi

        icon() { case "$1" in success) printf '✅';; failure) printf '❌';; *) printf '⏭️';; esac; }
        STATUS_VALUE=$(printf '🧬 Generate: %s\n🔍 Lint: %s\n🏗️ Build: %s\n🧪 Tests: %s\n🔒 Audit: %s' \
          "$(icon "$GEN")" "$(icon "$CHK")" "$(icon "$BLD")" "$(icon "$TST")" "$(icon "$AUD")")

        # Per-event details: commit message / author / PR link
        if [[ "$EVENT_NAME" == "pull_request" ]]; then
          COMMIT_MSG="$PR_TITLE"
          AUTHOR="${PR_AUTHOR:-$ACTOR}"
          PR_MD="[#${PR_NUMBER}: ${PR_TITLE}](${PR_URL})"
        else
          COMMIT_MSG=$(printf '%s' "$PUSH_MSG" | head -n1)
          AUTHOR="${PUSH_AUTHOR:-$ACTOR}"
          PR_MD=""
        fi
        [[ -z "$COMMIT_MSG" ]] && COMMIT_MSG="(no message)"
        SHORT_SHA="${COMMIT_SHA:0:7}"
        COMMIT_MD="[\`${SHORT_SHA}\`](${SERVER_URL}/${REPO}/commit/${COMMIT_SHA})"

        if [[ "$JOB_STATUS" == "success" ]]; then
          TITLE="✅ CI Pipeline Success"; DESC="All checks passed successfully!"; COLOR=3066993; BTN_STYLE=5; BTN_LABEL="View Build"
        else
          TITLE="❌ CI Pipeline Failed"; DESC="Build or tests failed!"; COLOR=15158332; BTN_STYLE=5; BTN_LABEL="View Failed Build"
        fi

        # Assemble the payload with jq (safe escaping of all dynamic strings)
        PAYLOAD=$(jq -n \
          --arg title "$TITLE" --arg desc "$DESC" --argjson color "$COLOR" \
          --arg repo "$REPO" --arg branch "$BRANCH" --arg author "$AUTHOR" \
          --arg commit "$COMMIT_MD" --arg msg "$COMMIT_MSG" \
          --arg pr "$PR_MD" --arg failed "$FAILED_STEP" --arg status "$STATUS_VALUE" \
          --arg ts "$TIMESTAMP" \
          --arg run_url "$RUN_URL" --argjson btn_style "$BTN_STYLE" --arg btn_label "$BTN_LABEL" \
          '{
            embeds: [
              ({
                title: $title,
                description: $desc,
                color: $color,
                fields: (
                  [ {name: "Repository", value: $repo, inline: true},
                    {name: "Branch", value: $branch, inline: true},
                    {name: "Author", value: $author, inline: true},
                    {name: "Commit", value: ($commit + "  " + $msg), inline: false} ]
                  + (if $pr != "" then [ {name: "Pull Request", value: $pr, inline: false} ] else [] end)
                  + (if $failed != "None" then [ {name: "Failed Step", value: $failed, inline: false} ] else [] end)
                  + [ {name: "Build Status", value: $status, inline: false} ]
                ),
                footer: {text: "Remargin CI"}
              } + (if $ts != "" then {timestamp: $ts} else {} end))
            ],
            components: [
              {type: 1, components: [ {type: 2, style: $btn_style, label: $btn_label, url: $run_url} ]}
            ]
          }')

        echo "Sending Discord notification..."
        echo "Job Status: $JOB_STATUS"
        echo "Failed Step: $FAILED_STEP"

        RESPONSE=$(curl -s -w "HTTPSTATUS:%{http_code}" -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK")
        HTTP_STATUS=$(echo "$RESPONSE" | tr -d '\n' | sed -e 's/.*HTTPSTATUS://')

        if [[ $HTTP_STATUS -eq 200 || $HTTP_STATUS -eq 204 ]]; then
          echo "✅ Discord notification sent successfully (HTTP $HTTP_STATUS)"
        else
          echo "❌ Discord notification failed (HTTP $HTTP_STATUS)"
          echo "Response: $RESPONSE"
        fi
